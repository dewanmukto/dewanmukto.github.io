<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dewan Mukto</title>
        <style>
            @import url(https://fonts.googleapis.com/css2?family=Lato&display=swap);
            @import url(https://fonts.googleapis.com/css2?family=Open+Sans&display=swap);
            @import url(https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined);
            @import url(https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css);
        </style>
    </head>
    <body>
        <div id="webcrumbs">
            <div class="p-4 md:p-8 max-w-7xl mx-auto">
                <div
                    id="intro"
                    class="flex justify-center items-center h-screen absolute inset-0 bg-black z-50 animate-fadeOut"
                    style="animation-delay: 3s; animation-duration: 1s; animation-fill-mode: forwards"
                >
                    <img
                        src="https://dewanmukto.com/asset/images/wordmark_logo.png"
                        alt="Dewan Mukto Logo"
                        class="w-64 animate-pulse"
                        style="animation-duration: 2s"
                    />
                </div>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div
                        class="md:col-span-8 lg:col-span-8 bg-gradient-to-br from-primary-500 to-primary-700 rounded-xl shadow-lg overflow-hidden group transition-transform duration-300 hover:-translate-y-1 hover:shadow-xl"
                    >
                        <a href="https://dewanmukto.com/page/merch" class="block p-8 h-full">
                            <div class="flex flex-col h-full justify-between">
                                <div class="flex items-center justify-between">
                                    <h2 class="text-3xl font-bold text-white">Explore Merch</h2>
                                    <span
                                        class="text-white text-2xl group-hover:translate-x-2 transition-transform duration-300"
                                        >►</span
                                    >
                                </div>
                                <div class="mt-4">
                                    <div class="grid grid-cols-2 gap-4 mt-6">
                                        <div class="bg-white/20 p-4 rounded-lg backdrop-blur-sm">
                                            <span class="material-symbols-outlined text-4xl text-white mb-2"
                                                >shopping_bag</span
                                            >
                                            <p class="text-white text-sm font-medium">Unique Designs</p>
                                        </div>
                                        <div class="bg-white/20 p-4 rounded-lg backdrop-blur-sm">
                                            <span class="material-symbols-outlined text-4xl text-white mb-2"
                                                >local_shipping</span
                                            >
                                            <p class="text-white text-sm font-medium">Worldwide Shipping</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div
                        class="md:col-span-4 lg:col-span-4 bg-neutral-800 rounded-xl shadow-lg overflow-hidden group transition-transform duration-300 hover:-translate-y-1 hover:shadow-xl relative min-h-[380px]"
                    >
                        <div class="block p-8 h-full grayscale">
                            <div class="flex flex-col h-full justify-between">
                                <div class="flex items-center justify-between">
                                    <h2 class="text-3xl font-bold text-white">Hire Services</h2>
                                    <span
                                        class="text-white text-2xl group-hover:translate-x-2 transition-transform duration-300"
                                        >►</span
                                    >
                                </div>
                                <div class="mt-4">
                                    <div class="grid grid-cols-1 gap-4 mt-6">
                                        <div class="bg-white/20 p-4 rounded-lg backdrop-blur-sm">
                                            <span class="material-symbols-outlined text-4xl text-white mb-2">code</span>
                                            <p class="text-white text-sm font-medium">Development</p>
                                        </div>
                                        <div class="bg-white/20 p-4 rounded-lg backdrop-blur-sm">
                                            <span class="material-symbols-outlined text-4xl text-white mb-2"
                                                >design_services</span
                                            >
                                            <p class="text-white text-sm font-medium">Design</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div
                            class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity duration-300 cursor-not-allowed"
                        >
                            <div class="bg-black/80 text-white px-4 py-2 rounded-lg text-sm font-medium">
                                Coming soon
                            </div>
                        </div>
                    </div>
                    <div
                        class="md:col-span-12 bg-neutral-100 rounded-xl shadow-md p-6 transition-transform duration-300 hover:-translate-y-1 hover:shadow-lg"
                    >
                        <div class="flex flex-wrap justify-center gap-6 max-w-5xl mx-auto">
                            <a
                                href="https://facebook.com/dewanmukto"
                                class="p-3 bg-white rounded-full shadow-sm hover:shadow-md transition-all duration-300 hover:-translate-y-1"
                                aria-label="Facebook"
                            >
                                <i class="fa-brands fa-facebook text-2xl text-blue-600"></i>
                            </a>
                            <a
                                href="https://instagram.com/dewanmukto"
                                class="p-3 bg-white rounded-full shadow-sm hover:shadow-md transition-all duration-300 hover:-translate-y-1"
                                aria-label="Instagram"
                            >
                                <i class="fa-brands fa-instagram text-2xl text-pink-600"></i>
                            </a>
                            <a
                                href="https://threads.net/dewanmukto"
                                class="p-3 bg-white rounded-full shadow-sm hover:shadow-md transition-all duration-300 hover:-translate-y-1"
                                aria-label="Threads"
                            >
                                <i class="fa-brands fa-threads text-2xl text-black"></i>
                            </a>
                            <a
                                href="https://tiktok.com/@dewanmukto"
                                class="p-3 bg-white rounded-full shadow-sm hover:shadow-md transition-all duration-300 hover:-translate-y-1"
                                aria-label="TikTok"
                            >
                                <i class="fa-brands fa-tiktok text-2xl text-black"></i>
                            </a>
                        
                            <a
                                href="https://www.youtube.com/@Dewan-Mukto/"
                                class="p-3 bg-white rounded-full shadow-sm hover:shadow-md transition-all duration-300 hover:-translate-y-1"
                                aria-label="YouTube"
                            >
                                <i class="fa-brands fa-youtube text-2xl text-red-600"></i>
                            </a>
                        </div>
                    </div>
                </div>
                <div class="mt-4 text-left text-xs text-gray-500">© 2025 Dewan Mukto Co.</div>
            </div>
        </div>

        <script>
            // Ensure intro div is removed from interaction after animation
            document.getElementById('intro').addEventListener('animationend', function() {
                this.style.display = 'none';
                this.style.pointerEvents = 'none'; // Prevent interaction
            });
